name: CI

on: [push, workflow_dispatch]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.12
          activate-environment: true
      - name: Install dependencies
        run: |
          uv sync --dev
      - name: Build
        run: uv build
      # Check that basic features work and we didn't miss to include crucial files
      - name: Pytest (wheel)
        run: uv run --isolated --no-project --with dist/*.whl pytest -q
      - name: Pytest (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz pytest -q
      - name: Check code quality
        run: |
          ruff format --check --diff
          ruff check --diff
      - name: Check typing
        run: |
          uvx ty check
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@master
