name: "Publish"

on:
  push:
    tags:
      # Publish on any tag starting with a `v`, e.g., v0.1.0
      - v*

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.12
          activate-environment: true
      - name: Build
        run: uv build
      # Check that basic features work and we didn't miss to include crucial files
      - name: Pytest (wheel)
        run: uv run --isolated --no-project --with dist/*.whl pytest -q
      - name: Pytest (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz pytest -q
      - name: Publish
        run: uv publish